<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weekend Finder — Billigaste helgresorna</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #07080c;
      --card: #0f1117;
      --card-border: #1a1d27;
      --card-hover: #151820;
      --accent: #38bdf8;
      --accent-glow: rgba(56, 189, 248, 0.15);
      --orange: #f97316;
      --orange-glow: rgba(249, 115, 22, 0.15);
      --green: #22c55e;
      --green-glow: rgba(34, 197, 94, 0.1);
      --red: #ef4444;
      --text: #e2e8f0;
      --text-muted: #64748b;
      --text-dim: #475569;
      --surface: #0c0d12;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -40%;
      left: -20%;
      width: 80%;
      height: 80%;
      background: radial-gradient(ellipse, rgba(56, 189, 248, 0.04) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -30%;
      right: -20%;
      width: 70%;
      height: 70%;
      background: radial-gradient(ellipse, rgba(249, 115, 22, 0.03) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 16px 80px;
    }

    /* --- Header --- */
    .header {
      text-align: center;
      padding: 32px 0 24px;
    }
    .header h1 {
      font-family: 'Sora', sans-serif;
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), #818cf8, var(--orange));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
    }
    .header p {
      color: var(--text-muted);
      margin-top: 8px;
      font-size: 0.95rem;
    }

    /* --- Duration tabs --- */
    .dur-tabs {
      display: flex;
      gap: 4px;
      background: var(--surface);
      border-radius: 14px;
      padding: 4px;
      margin-bottom: 20px;
      border: 1px solid var(--card-border);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .dur-tab {
      flex: 1;
      min-width: 0;
      padding: 11px 8px;
      text-align: center;
      border-radius: 10px;
      cursor: pointer;
      font-family: 'Sora', sans-serif;
      font-weight: 600;
      font-size: 0.78rem;
      color: var(--text-muted);
      transition: all 0.3s ease;
      border: none;
      background: none;
      white-space: nowrap;
    }
    .dur-tab.active {
      background: var(--card);
      color: var(--accent);
      box-shadow: 0 2px 12px var(--accent-glow);
    }
    .dur-tab:hover:not(.active) { color: var(--text); }
    .dur-tab .emoji { display: block; font-size: 1.2rem; margin-bottom: 3px; }

    /* --- Search panel --- */
    .search-panel {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
    }
    .form-row {
      display: grid;
      gap: 12px;
      margin-bottom: 16px;
    }
    .form-row.two-col { grid-template-columns: 1fr 1fr; }

    .field label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
      font-family: 'Sora', sans-serif;
    }
    .field select,
    .field input {
      width: 100%;
      padding: 12px 14px;
      background: var(--bg);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      transition: border-color 0.2s;
      outline: none;
    }
    .field select:focus,
    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .field select { cursor: pointer; }
    .field select option { background: var(--bg); color: var(--text); }

    /* Date display for fixed durations */
    .date-row {
      display: flex;
      gap: 10px;
      align-items: stretch;
    }
    .date-info {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      background: var(--bg);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      font-size: 0.88rem;
      color: var(--text);
      flex: 1;
    }
    .date-info .arrow { color: var(--accent); font-weight: 600; }
    .date-nav {
      display: flex;
      gap: 6px;
      margin-left: auto;
    }
    .date-nav button {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: 1px solid var(--card-border);
      background: var(--card);
      color: var(--text);
      cursor: pointer;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .date-nav button:hover { border-color: var(--accent); color: var(--accent); }

    /* Flex date row */
    .flex-dates {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .section-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
      font-family: 'Sora', sans-serif;
    }

    /* Airport checkboxes */
    .airport-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }
    .airport-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      background: var(--bg);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.82rem;
    }
    .airport-chip:hover { border-color: var(--text-dim); }
    .airport-chip.selected {
      border-color: var(--accent);
      background: var(--accent-glow);
    }
    .airport-chip .code {
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      color: var(--accent);
      font-size: 0.85rem;
    }
    .airport-chip .name {
      color: var(--text-muted);
      font-size: 0.75rem;
    }

    /* Destination chips */
    .dest-section { margin-bottom: 16px; }
    .dest-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .dest-chip {
      padding: 6px 12px;
      background: var(--bg);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.2s;
      color: var(--text-muted);
    }
    .dest-chip:hover { border-color: var(--text-dim); color: var(--text); }
    .dest-chip.selected {
      border-color: var(--orange);
      background: var(--orange-glow);
      color: var(--orange);
    }
    .dest-select-all {
      padding: 6px 12px;
      background: var(--accent-glow);
      color: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.78rem;
      font-weight: 600;
      margin-bottom: 8px;
      font-family: 'Sora', sans-serif;
      transition: all 0.2s;
    }
    .dest-select-all:hover { opacity: 0.8; }

    /* Search button */
    .search-btn {
      width: 100%;
      padding: 14px 24px;
      background: linear-gradient(135deg, var(--accent), #818cf8);
      color: #000;
      border: none;
      border-radius: 12px;
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.3s;
      letter-spacing: 0.02em;
    }
    .search-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px var(--accent-glow);
    }
    .search-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(0,0,0,0.2);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* --- Toggle row --- */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 14px 20px;
      margin-bottom: 20px;
    }
    .toggle-row span { font-size: 0.9rem; color: var(--text-muted); }
    .toggle {
      position: relative;
      width: 48px;
      height: 26px;
      cursor: pointer;
    }
    .toggle input { display: none; }
    .toggle-track {
      position: absolute;
      inset: 0;
      background: var(--card-border);
      border-radius: 13px;
      transition: background 0.3s;
    }
    .toggle input:checked + .toggle-track { background: var(--orange); }
    .toggle-knob {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 20px;
      height: 20px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.3s;
    }
    .toggle input:checked ~ .toggle-knob { transform: translateX(22px); }

    /* --- Results --- */
    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .results-header h2 {
      font-family: 'Sora', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
    }
    .results-count { font-size: 0.82rem; color: var(--text-muted); }
    .api-note {
      font-size: 0.75rem;
      color: var(--text-dim);
      text-align: center;
      margin-top: 8px;
      margin-bottom: 16px;
    }

    .flight-card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 18px 20px;
      margin-bottom: 10px;
      transition: all 0.2s;
      animation: fadeUp 0.4s ease both;
    }
    .flight-card:hover {
      border-color: var(--text-dim);
      background: var(--card-hover);
    }
    .flight-card.cheapest {
      border-color: var(--green);
      box-shadow: 0 0 20px var(--green-glow);
    }
    .flight-card.cheapest::before {
      content: '🏆 BILLIGAST';
      display: inline-block;
      font-family: 'Sora', sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      color: var(--green);
      background: var(--green-glow);
      padding: 3px 10px;
      border-radius: 6px;
      margin-bottom: 10px;
      letter-spacing: 0.05em;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }
    .card-dest {
      font-family: 'Sora', sans-serif;
      font-size: 1.15rem;
      font-weight: 700;
    }
    .card-dest .flag { margin-right: 6px; }
    .card-origin {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .card-origin .code {
      font-family: 'Sora', sans-serif;
      font-weight: 600;
      color: var(--accent);
    }
    .card-price { text-align: right; flex-shrink: 0; }
    .price-flight {
      font-family: 'Sora', sans-serif;
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--orange);
    }
    .price-total {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .price-total b { color: var(--text); font-weight: 600; }

    .card-details {
      display: flex;
      gap: 16px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--card-border);
      flex-wrap: wrap;
    }
    .detail { font-size: 0.78rem; color: var(--text-muted); }
    .detail b { color: var(--text); font-weight: 500; }
    .stops-0 { color: var(--green); }
    .stops-1 { color: var(--orange); }
    .stops-2 { color: var(--red); }

    .loading-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .loading-state .big-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--card-border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
    .error-state {
      text-align: center;
      padding: 30px;
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: 12px;
      color: var(--red);
      font-size: 0.9rem;
    }

    /* Quick date buttons */
    .quick-dates {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 4px;
    }
    .qd-btn {
      padding: 6px 14px;
      background: var(--bg);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      color: var(--text-muted);
      font-family: 'Sora', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .qd-btn:hover { border-color: var(--text-dim); color: var(--text); }
    .qd-btn.active {
      border-color: var(--accent);
      background: var(--accent-glow);
      color: var(--accent);
    }

    .hidden { display: none !important; }

    @media (max-width: 600px) {
      .form-row.two-col { grid-template-columns: 1fr; }
      .flex-dates { grid-template-columns: 1fr; }
      .date-row { flex-direction: column; }
      .card-top { flex-direction: column; }
      .card-price { text-align: left; }
      .card-details { gap: 10px; }
      .container { padding: 16px 12px 60px; }
      .dur-tab { padding: 10px 6px; font-size: 0.72rem; }
      .dur-tab .emoji { font-size: 1rem; }
    }
  </style>
</head>
<body>

<div class="container">

  <div class="header">
    <h1>✈️ Weekend Finder</h1>
    <p>Hitta billigaste helgresorna från alla flygplatser nära dig</p>
  </div>

  <!-- Duration tabs -->
  <div class="dur-tabs">
    <button class="dur-tab active" data-days="2" onclick="selectDuration(2)">
      <span class="emoji">⚡</span> 2 dagar
    </button>
    <button class="dur-tab" data-days="3" onclick="selectDuration(3)">
      <span class="emoji">🌴</span> 3 dagar
    </button>
    <button class="dur-tab" data-days="5" onclick="selectDuration(5)">
      <span class="emoji">🧳</span> 5 dagar
    </button>
    <button class="dur-tab" data-days="7" onclick="selectDuration(7)">
      <span class="emoji">🏖️</span> 7 dagar
    </button>
    <button class="dur-tab" data-days="0" onclick="selectDuration(0)">
      <span class="emoji">📅</span> Flex
    </button>
  </div>

  <!-- Search panel -->
  <div class="search-panel">

    <!-- Fixed duration date -->
    <div id="fixed-date-section" style="margin-bottom:16px">
      <div class="field">
        <label>Avresedag</label>
        <div class="quick-dates" id="quick-dates">
          <button class="qd-btn" onclick="quickDate('today')">Idag</button>
          <button class="qd-btn" onclick="quickDate('tomorrow')">Imorgon</button>
          <button class="qd-btn" onclick="quickDate('thisWeekend')">Denna helg</button>
          <button class="qd-btn active" onclick="quickDate('nextWeekend')">Nästa helg</button>
          <button class="qd-btn" onclick="quickDate('nextWeek')">Nästa vecka</button>
        </div>
        <div class="date-row" style="margin-top:8px">
          <input type="date" id="dep-date" onchange="updateReturnDate();clearQuickDate()" style="max-width:180px">
          <div class="date-info" id="trip-summary">
            <span id="trip-dep-label">—</span>
            <span class="arrow">→</span>
            <span id="trip-ret-label">—</span>
            <span style="color:var(--text-dim);font-size:0.8rem;margin-left:4px" id="trip-nights"></span>
            <div class="date-nav">
              <button onclick="shiftDate(-7)" title="Förra veckan">‹</button>
              <button onclick="shiftDate(7)" title="Nästa vecka">›</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Flex dates -->
    <div id="flex-date-section" class="hidden" style="margin-bottom:16px">
      <div class="flex-dates">
        <div class="field">
          <label>Avresa</label>
          <input type="date" id="flex-dep">
        </div>
        <div class="field">
          <label>Hemresa</label>
          <input type="date" id="flex-ret">
        </div>
      </div>
    </div>

    <!-- Airports -->
    <div style="margin-bottom:16px">
      <div class="section-label">Sök från dessa flygplatser</div>
      <div class="airport-grid" id="airport-grid"></div>
    </div>

    <!-- Destinations -->
    <div class="dest-section">
      <div class="section-label">Destinationer</div>
      <button class="dest-select-all" onclick="toggleAllDests()">Välj alla / Ingen</button>
      <div class="dest-grid" id="dest-grid"></div>
    </div>

    <button class="search-btn" id="search-btn" onclick="doSearch()">
      Sök flyg
    </button>
  </div>

  <!-- Hotel toggle -->
  <div class="toggle-row hidden" id="hotel-toggle-row">
    <span>🏨 Inkludera uppskattat hotell i totalpris</span>
    <label class="toggle">
      <input type="checkbox" id="hotel-toggle" onchange="rerenderResults()">
      <div class="toggle-track"></div>
      <div class="toggle-knob"></div>
    </label>
  </div>

  <div id="results-area"></div>

</div>

<script>
const AIRPORTS = [
  // Nära Göteborg (default på)
  { code: 'GOT', name: 'Göteborg Landvetter', default: true },
  { code: 'CPH', name: 'Köpenhamn Kastrup', default: true },
  { code: 'MMX', name: 'Malmö Sturup', default: true },
  { code: 'HAD', name: 'Halmstad', default: false },
  // Stockholm-området
  { code: 'ARN', name: 'Stockholm Arlanda', default: false },
  { code: 'NYO', name: 'Stockholm Skavsta', default: false },
  { code: 'VST', name: 'Stockholm Västerås', default: false },
  // Mellan Stockholm & Göteborg
  { code: 'NRK', name: 'Norrköping', default: false },
  { code: 'LPI', name: 'Linköping', default: false },
  { code: 'JKG', name: 'Jönköping', default: false },
  { code: 'KSD', name: 'Karlstad', default: false },
  // Småland & Blekinge
  { code: 'VXO', name: 'Växjö', default: false },
  { code: 'KLR', name: 'Kalmar', default: false },
  { code: 'RNB', name: 'Ronneby', default: false },
];

const DESTINATIONS = [
  { code: 'LON', name: 'London', flag: '🇬🇧', hotel: 1100 },
  { code: 'BCN', name: 'Barcelona', flag: '🇪🇸', hotel: 750 },
  { code: 'BER', name: 'Berlin', flag: '🇩🇪', hotel: 700 },
  { code: 'AMS', name: 'Amsterdam', flag: '🇳🇱', hotel: 950 },
  { code: 'PRG', name: 'Prag', flag: '🇨🇿', hotel: 550 },
  { code: 'BUD', name: 'Budapest', flag: '🇭🇺', hotel: 500 },
  { code: 'FCO', name: 'Rom', flag: '🇮🇹', hotel: 800 },
  { code: 'CDG', name: 'Paris', flag: '🇫🇷', hotel: 1000 },
  { code: 'ALC', name: 'Alicante', flag: '🇪🇸', hotel: 600 },
  { code: 'AGP', name: 'Malaga', flag: '🇪🇸', hotel: 650 },
  { code: 'ATH', name: 'Aten', flag: '🇬🇷', hotel: 600 },
  { code: 'WAW', name: 'Warszawa', flag: '🇵🇱', hotel: 500 },
  { code: 'KRK', name: 'Krakow', flag: '🇵🇱', hotel: 450 },
  { code: 'LIS', name: 'Lissabon', flag: '🇵🇹', hotel: 700 },
  { code: 'MIL', name: 'Milano', flag: '🇮🇹', hotel: 800 },
  { code: 'VIE', name: 'Wien', flag: '🇦🇹', hotel: 800 },
  { code: 'IST', name: 'Istanbul', flag: '🇹🇷', hotel: 500 },
  { code: 'SPU', name: 'Split', flag: '🇭🇷', hotel: 600 },
  { code: 'DUB', name: 'Dublin', flag: '🇮🇪', hotel: 950 },
  { code: 'NCE', name: 'Nice', flag: '🇫🇷', hotel: 850 },
  { code: 'BKK', name: 'Bangkok', flag: '🇹🇭', hotel: 350 },
  { code: 'TIA', name: 'Tirana', flag: '🇦🇱', hotel: 350 },
  { code: 'BEG', name: 'Belgrad', flag: '🇷🇸', hotel: 400 },
  { code: 'OTP', name: 'Bukarest', flag: '🇷🇴', hotel: 400 },
  { code: 'SOF', name: 'Sofia', flag: '🇧🇬', hotel: 350 },
];

let selectedDuration = 2;
let currentResults = [];
let isSearching = false;

// ===== INIT =====
document.addEventListener('DOMContentLoaded', () => {
  buildAirportChips();
  buildDestChips();
  setDefaultDepDate();
  updateReturnDate();
});

function buildAirportChips() {
  const grid = document.getElementById('airport-grid');
  AIRPORTS.forEach(ap => {
    const chip = document.createElement('div');
    chip.className = 'airport-chip' + (ap.default ? ' selected' : '');
    chip.dataset.code = ap.code;
    chip.innerHTML = '<span class="code">' + ap.code + '</span><span class="name">' + ap.name + '</span>';
    chip.onclick = () => chip.classList.toggle('selected');
    grid.appendChild(chip);
  });
}

function buildDestChips() {
  const grid = document.getElementById('dest-grid');
  DESTINATIONS.forEach((d, i) => {
    const chip = document.createElement('div');
    chip.className = 'dest-chip' + (i < 10 ? ' selected' : '');
    chip.dataset.code = d.code;
    chip.textContent = d.flag + ' ' + d.name;
    chip.onclick = () => chip.classList.toggle('selected');
    grid.appendChild(chip);
  });
}

function toggleAllDests() {
  const chips = document.querySelectorAll('#dest-grid .dest-chip');
  const anySelected = [...chips].some(c => c.classList.contains('selected'));
  chips.forEach(c => {
    if (anySelected) c.classList.remove('selected');
    else c.classList.add('selected');
  });
}

// ===== DURATION =====
function selectDuration(days) {
  selectedDuration = days;
  document.querySelectorAll('.dur-tab').forEach(t => {
    t.classList.toggle('active', parseInt(t.dataset.days) === days);
  });
  const isFixed = days > 0;
  document.getElementById('fixed-date-section').classList.toggle('hidden', !isFixed);
  document.getElementById('flex-date-section').classList.toggle('hidden', isFixed);
  if (isFixed) {
    updateReturnDate();
  } else {
    var dep = document.getElementById('dep-date').value;
    document.getElementById('flex-dep').value = dep;
    var retDate = new Date(dep);
    retDate.setDate(retDate.getDate() + 3);
    document.getElementById('flex-ret').value = fmt(retDate);
  }
}

// ===== DATES =====
function setDefaultDepDate() {
  var today = new Date();
  var day = today.getDay();
  var daysUntil = (5 - day + 7) % 7 || 7; // Next Friday
  var dep = new Date(today);
  dep.setDate(today.getDate() + daysUntil);
  document.getElementById('dep-date').value = fmt(dep);
}

function updateReturnDate() {
  if (selectedDuration === 0) return;
  var depVal = document.getElementById('dep-date').value;
  if (!depVal) return;
  var dep = new Date(depVal);
  var ret = new Date(dep);
  ret.setDate(dep.getDate() + selectedDuration);
  document.getElementById('trip-dep-label').textContent = formatDateShort(dep);
  document.getElementById('trip-ret-label').textContent = formatDateShort(ret);
  document.getElementById('trip-nights').textContent = '(' + selectedDuration + ' nätter)';
}

function shiftDate(days) {
  var input = document.getElementById('dep-date');
  var d = new Date(input.value);
  d.setDate(d.getDate() + days);
  input.value = fmt(d);
  updateReturnDate();
  clearQuickDate();
}

function quickDate(preset) {
  var today = new Date();
  var day = today.getDay();
  var dep;

  switch (preset) {
    case 'today':
      dep = today;
      break;
    case 'tomorrow':
      dep = new Date(today);
      dep.setDate(today.getDate() + 1);
      break;
    case 'thisWeekend':
      // This coming Friday (or today if it's Fri/Sat)
      if (day === 5) dep = today;
      else if (day === 6) dep = today;
      else {
        dep = new Date(today);
        dep.setDate(today.getDate() + ((5 - day + 7) % 7));
      }
      break;
    case 'nextWeekend':
      dep = new Date(today);
      var daysToFri = (5 - day + 7) % 7 || 7;
      if (day < 5) daysToFri += 7; // Skip to NEXT week's Friday
      if (day === 5 || day === 6) daysToFri = (5 - day + 7) % 7 + 7;
      dep.setDate(today.getDate() + daysToFri);
      break;
    case 'nextWeek':
      dep = new Date(today);
      dep.setDate(today.getDate() + ((1 - day + 7) % 7 || 7)); // Next Monday
      break;
  }

  document.getElementById('dep-date').value = fmt(dep);
  updateReturnDate();

  // Highlight active button
  document.querySelectorAll('.qd-btn').forEach(function(b) { b.classList.remove('active'); });
  event.target.classList.add('active');
}

function clearQuickDate() {
  document.querySelectorAll('.qd-btn').forEach(function(b) { b.classList.remove('active'); });
}

function fmt(d) { return d.toISOString().split('T')[0]; }

function formatDateShort(d) {
  var days = ['Sön','Mån','Tis','Ons','Tor','Fre','Lör'];
  var months = ['jan','feb','mar','apr','maj','jun','jul','aug','sep','okt','nov','dec'];
  return days[d.getDay()] + ' ' + d.getDate() + ' ' + months[d.getMonth()];
}

function getDates() {
  if (selectedDuration === 0) {
    return {
      dep: document.getElementById('flex-dep').value,
      ret: document.getElementById('flex-ret').value
    };
  }
  var dep = document.getElementById('dep-date').value;
  var depDate = new Date(dep);
  var retDate = new Date(depDate);
  retDate.setDate(depDate.getDate() + selectedDuration);
  return { dep: dep, ret: fmt(retDate) };
}

// ===== SEARCH =====
async function doSearch() {
  if (isSearching) return;

  var dates = getDates();
  if (!dates.dep || !dates.ret) return alert('Välj datum');

  var origins = [...document.querySelectorAll('#airport-grid .airport-chip.selected')]
    .map(c => c.dataset.code);
  if (origins.length === 0) return alert('Välj minst en flygplats');

  var dests = [...document.querySelectorAll('#dest-grid .dest-chip.selected')]
    .map(c => c.dataset.code);
  if (dests.length === 0) return alert('Välj minst en destination');

  isSearching = true;
  var btn = document.getElementById('search-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Söker flyg...';

  var area = document.getElementById('results-area');
  var totalSearches = origins.length * dests.length;
  area.innerHTML =
    '<div class="loading-state">' +
    '<div class="big-spinner"></div>' +
    '<p>Söker billigaste flygningarna...</p>' +
    '<p style="font-size:0.8rem;margin-top:6px;color:var(--text-dim)">' +
    totalSearches + ' kombinationer · Kan ta 15–60 sek</p></div>';

  try {
    var allResults = [];
    var completed = 0;

    for (var oi = 0; oi < origins.length; oi++) {
      var origin = origins[oi];
      var qs = 'origins=' + origin +
        '&destinations=' + dests.join(',') +
        '&outbound_date=' + dates.dep +
        '&return_date=' + dates.ret;

      var resp = await fetch('/api/flights?' + qs);
      var data = await resp.json();

      if (data.error) {
        console.warn('Error for ' + origin + ':', data.error);
        continue;
      }
      if (data.results) {
        allResults = allResults.concat(data.results);
      }
      completed += dests.length;
      var loadP = area.querySelector('p');
      if (loadP) loadP.textContent = 'Söker... ' + completed + '/' + totalSearches + ' klara';
    }

    currentResults = allResults;
    document.getElementById('hotel-toggle-row').classList.remove('hidden');
    rerenderResults();

  } catch (err) {
    area.innerHTML =
      '<div class="error-state">' +
      '<p>⚠️ Sökningen misslyckades</p>' +
      '<p style="margin-top:6px;font-size:0.82rem;opacity:0.8">' + err.message + '</p>' +
      '<p style="margin-top:8px;font-size:0.78rem;color:var(--text-dim)">' +
      'Kontrollera att SERPAPI_KEY är konfigurerad i Vercel</p></div>';
  } finally {
    isSearching = false;
    btn.disabled = false;
    btn.textContent = 'Sök flyg';
  }
}

// ===== RENDER =====
function rerenderResults() {
  var area = document.getElementById('results-area');
  var includeHotel = document.getElementById('hotel-toggle').checked;
  var results = currentResults;

  if (results.length === 0) {
    area.innerHTML =
      '<div class="empty-state"><div class="icon">🔍</div>' +
      '<p>Inga flyg hittades för dessa datum.</p>' +
      '<p style="font-size:0.82rem;color:var(--text-dim);margin-top:6px">Prova andra datum eller destinationer</p></div>';
    return;
  }

  var dates = getDates();
  var depDate = new Date(dates.dep);
  var retDate = new Date(dates.ret);
  var nights = Math.max(1, Math.round((retDate - depDate) / (1000 * 60 * 60 * 24)));

  var enriched = results.map(function(r) {
    var destInfo = DESTINATIONS.find(function(d) {
      return d.code === r.destination_code ||
        (r.destination_name && r.destination_name.toLowerCase().indexOf(d.name.toLowerCase()) >= 0);
    });
    var hotelPerNight = destInfo ? destInfo.hotel : 600;
    var hotelTotal = hotelPerNight * nights;
    var flag = destInfo ? destInfo.flag : '🌍';
    var totalCost = includeHotel ? r.price + hotelTotal : r.price;
    return Object.assign({}, r, {
      hotelPerNight: hotelPerNight,
      hotelTotal: hotelTotal,
      flag: flag,
      totalCost: totalCost,
      nights: nights
    });
  });

  enriched.sort(function(a, b) { return a.totalCost - b.totalCost; });

  var html =
    '<div class="results-header">' +
    '<h2>Resultat</h2>' +
    '<span class="results-count">' + enriched.length + ' flyg · ' + nights + ' nätter</span></div>';

  enriched.forEach(function(r, i) {
    var isCheapest = i === 0;
    var stopsText = r.stops === 0 ? 'Direkt' : r.stops + ' mellanlandning' + (r.stops > 1 ? 'ar' : '');
    var stopsClass = 'stops-' + Math.min(r.stops, 2);
    var durationH = Math.floor(r.total_duration / 60);
    var durationM = r.total_duration % 60;
    var destMatch = DESTINATIONS.find(function(d) { return d.code === r.destination_code; });
    var destLabel = destMatch ? destMatch.name : (r.destination_name || r.destination_code);

    html +=
      '<div class="flight-card ' + (isCheapest ? 'cheapest' : '') + '" style="animation-delay:' + (i * 0.04) + 's">' +
      '<div class="card-top"><div>' +
      '<div class="card-dest"><span class="flag">' + r.flag + '</span>' + destLabel + '</div>' +
      '<div class="card-origin">Från <span class="code">' + r.origin + '</span> · ' +
      (r.airlines ? r.airlines.join(', ') : '—') + '</div>' +
      '</div><div class="card-price">' +
      '<div class="price-flight">' + formatPrice(r.price) + ' kr</div>' +
      (includeHotel ?
        '<div class="price-total">+ hotell ' + formatPrice(r.hotelTotal) + ' kr = <b>' +
        formatPrice(r.totalCost) + ' kr</b></div>' : '') +
      '</div></div>' +
      '<div class="card-details">' +
      '<div class="detail"><b class="' + stopsClass + '">' + stopsText + '</b></div>' +
      (r.total_duration ? '<div class="detail">' + durationH + 'h ' + durationM + 'm</div>' : '') +
      (r.departure_time ? '<div class="detail">Avg ' + (r.departure_time.split(' ').pop() || r.departure_time) + '</div>' : '') +
      (includeHotel ? '<div class="detail">🏨 ~' + formatPrice(r.hotelPerNight) + ' kr/natt × ' + r.nights + '</div>' : '') +
      '</div></div>';
  });

  html += '<p class="api-note">Priser från Google Flights via SerpAPI · Hotellpriser är uppskattningar för budgethotell</p>';
  area.innerHTML = html;
}

function formatPrice(n) {
  return Math.round(n).toLocaleString('sv-SE');
}
