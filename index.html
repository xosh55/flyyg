<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0A0A0F">
  <title>Flyyg — Sveriges smartaste helgsök</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      /* Bakgrund */
      --bg-primary:      #0A0A0F;
      --bg-secondary:    #111118;
      --bg-tertiary:     #1A1A24;
      --bg-card:         #15151E;
      --bg-card-hover:   #1E1E2A;
      --bg-elevated:     #1F1F2C;

      /* Border */
      --border-subtle:   #ffffff0d;
      --border-default:  #ffffff1a;
      --border-strong:   #ffffff33;

      /* Brand */
      --primary:         #6366F1;
      --primary-hover:   #818CF8;
      --primary-muted:   #6366F133;
      --primary-glow:    #6366F126;
      --secondary:       #22D3EE;
      --secondary-muted: #22D3EE1a;
      --secondary-glow:  #22D3EE1f;

      /* Text */
      --text-primary:    #F1F1F4;
      --text-secondary:  #A1A1B5;
      --text-tertiary:   #6B6B80;
      --text-inverse:    #0A0A0F;

      /* Semantiska */
      --success:         #10B981;
      --success-muted:   #10B98120;
      --warning:         #F59E0B;
      --warning-muted:   #F59E0B20;
      --error:           #EF4444;
      --error-muted:     #EF444420;

      /* Typografi */
      --font-display:    'Space Grotesk', system-ui, sans-serif;
      --font-body:       'Inter', system-ui, sans-serif;

      /* Radius */
      --r-sm: 6px; --r-md: 10px; --r-lg: 14px; --r-xl: 20px; --r-full: 9999px;

      /* Shadow */
      --shadow-sm:    0 1px 2px rgba(0,0,0,.4);
      --shadow-md:    0 4px 12px rgba(0,0,0,.5);
      --shadow-lg:    0 8px 25px rgba(0,0,0,.6);
      --shadow-glow:  0 0 24px rgba(99,102,241,.18);
      --shadow-card:  0 2px 8px rgba(0,0,0,.3), 0 0 0 1px var(--border-subtle);

      /* Motion */
      --d-instant: 100ms; --d-fast: 150ms; --d-base: 200ms; --d-mod: 300ms;
      --ease-out:    cubic-bezier(0,0,.2,1);
      --ease-in-out: cubic-bezier(.4,0,.2,1);
      --ease-spring: cubic-bezier(.34,1.56,.64,1);
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .01ms !important;
        transition-duration: .01ms !important;
      }
    }

    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: var(--font-body);
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      font-feature-settings: 'cv11', 'ss01';
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Bakgrunds-glow */
    body::before {
      content: '';
      position: fixed;
      top: -30%; left: -10%;
      width: 70%; height: 80%;
      background: radial-gradient(ellipse at center, rgba(99,102,241,.08) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
      animation: float1 20s ease-in-out infinite;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -20%; right: -10%;
      width: 60%; height: 70%;
      background: radial-gradient(ellipse at center, rgba(34,211,238,.06) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
      animation: float2 25s ease-in-out infinite;
    }
    @keyframes float1 {
      0%,100% { transform: translate(0,0); }
      50% { transform: translate(40px,30px); }
    }
    @keyframes float2 {
      0%,100% { transform: translate(0,0); }
      50% { transform: translate(-30px,-40px); }
    }

    .container {
      position: relative; z-index: 1;
      max-width: 920px;
      margin: 0 auto;
      padding: 32px 16px calc(80px + env(safe-area-inset-bottom));
    }

    /* ═══════ HEADER ═══════ */
    .header { text-align: center; padding: 16px 0 32px; }
    .header .logo {
      font-family: var(--font-display);
      font-size: clamp(2.2rem, 6vw, 3rem);
      font-weight: 800;
      letter-spacing: -.03em;
      background: linear-gradient(135deg, #F1F1F4 0%, var(--primary-hover) 50%, var(--secondary) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
    }
    .header .tagline {
      color: var(--text-secondary);
      margin-top: 12px;
      font-size: .95rem;
      font-weight: 400;
    }
    .header .badge-row {
      display: flex; justify-content: center; gap: 8px; margin-top: 14px;
    }
    .mini-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-family: var(--font-display);
      font-size: .68rem; font-weight: 600;
      color: var(--text-tertiary);
      padding: 4px 10px;
      border: 1px solid var(--border-subtle);
      border-radius: var(--r-full);
      letter-spacing: .03em;
    }
    .mini-badge .dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 8px var(--success);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; } 50% { opacity: .4; }
    }

    /* ═══════ DURATION TABS ═══════ */
    .dur-tabs {
      display: flex; gap: 6px;
      background: var(--bg-secondary);
      border-radius: var(--r-full);
      padding: 6px;
      margin-bottom: 20px;
      border: 1px solid var(--border-subtle);
      overflow-x: auto;
      scrollbar-width: none;
    }
    .dur-tabs::-webkit-scrollbar { display: none; }
    .dur-tab {
      flex: 1; min-width: 64px;
      padding: 10px 14px;
      border-radius: var(--r-full);
      cursor: pointer;
      font-family: var(--font-display);
      font-weight: 600;
      font-size: .82rem;
      color: var(--text-secondary);
      transition: all var(--d-base) var(--ease-out);
      border: none;
      background: none;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }
    .dur-tab:hover:not(.active) { color: var(--text-primary); }
    .dur-tab.active {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 4px 14px var(--primary-glow);
    }

    /* ═══════ SÖKPANEL (glassmorphism) ═══════ */
    .search-panel {
      position: relative;
      background: linear-gradient(180deg, var(--bg-card) 0%, var(--bg-secondary) 100%);
      border: 1px solid var(--border-default);
      border-radius: var(--r-xl);
      padding: 24px;
      margin-bottom: 20px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: var(--shadow-lg), inset 0 1px 0 var(--border-default);
    }
    .search-panel::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: var(--r-xl);
      padding: 1px;
      background: linear-gradient(135deg, var(--primary-glow), transparent 50%, var(--secondary-glow));
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
              mask-composite: exclude;
      pointer-events: none;
    }

    .label {
      display: block;
      font-family: var(--font-display);
      font-size: .68rem;
      font-weight: 600;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 10px;
    }

    /* Quick dates */
    .quick-dates {
      display: flex; gap: 6px; flex-wrap: wrap;
    }
    .qd-btn {
      padding: 8px 14px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-subtle);
      border-radius: var(--r-full);
      color: var(--text-secondary);
      font-family: var(--font-display);
      font-size: .78rem;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--d-base) var(--ease-out);
      -webkit-tap-highlight-color: transparent;
      position: relative;
    }
    .qd-btn:hover { border-color: var(--border-strong); color: var(--text-primary); }
    .qd-btn.active {
      background: var(--primary-muted);
      border-color: var(--primary);
      color: var(--primary-hover);
    }
    .qd-btn .countdown {
      display: block;
      font-size: .62rem;
      font-weight: 500;
      opacity: .7;
      margin-top: 1px;
    }

    /* Date row */
    .date-row {
      display: flex; gap: 10px; align-items: stretch; margin-top: 12px;
    }
    input[type="date"] {
      padding: 12px 14px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-subtle);
      border-radius: var(--r-md);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: .9rem;
      max-width: 180px;
      outline: none;
      transition: border-color var(--d-base);
      color-scheme: dark;
    }
    input[type="date"]:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-glow);
    }
    .trip-summary {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-subtle);
      border-radius: var(--r-md);
      font-size: .88rem;
      flex: 1;
      font-variant-numeric: tabular-nums;
    }
    .trip-summary .arrow {
      color: var(--secondary);
      font-weight: 600;
    }
    .trip-summary .nights {
      color: var(--text-tertiary);
      font-size: .78rem;
      margin-left: 2px;
    }
    .date-nav {
      display: flex; gap: 6px; margin-left: auto;
    }
    .date-nav button {
      width: 30px; height: 30px;
      border-radius: var(--r-sm);
      border: 1px solid var(--border-default);
      background: var(--bg-card);
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      transition: all var(--d-fast);
      -webkit-tap-highlight-color: transparent;
    }
    .date-nav button:hover {
      border-color: var(--primary);
      color: var(--primary-hover);
    }

    /* Flex dates grid */
    .flex-dates { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .flex-dates input[type="date"] { max-width: none; width: 100%; }

    .section { margin-top: 20px; }

    /* ═══════ AIRPORT CHIPS ═══════ */
    .airport-grid, .dest-grid {
      display: flex; flex-wrap: wrap; gap: 8px;
    }
    .chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 14px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-subtle);
      border-radius: var(--r-full);
      cursor: pointer;
      transition: all var(--d-base) var(--ease-out);
      font-size: .82rem;
      color: var(--text-secondary);
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .chip:hover {
      border-color: var(--border-strong);
      color: var(--text-primary);
      transform: translateY(-1px);
    }
    .airport-chip.selected {
      background: var(--primary-muted);
      border-color: var(--primary);
      color: var(--primary-hover);
    }
    .airport-chip .code {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: .82rem;
      letter-spacing: .02em;
    }
    .airport-chip .name {
      color: inherit;
      opacity: .65;
      font-size: .74rem;
    }
    .dest-chip.selected {
      background: var(--secondary-muted);
      border-color: var(--secondary);
      color: var(--secondary);
    }

    .dest-toolbar {
      display: flex; gap: 8px; margin-bottom: 10px;
    }
    .dest-toolbar button {
      padding: 6px 12px;
      background: transparent;
      border: 1px dashed var(--border-default);
      border-radius: var(--r-full);
      color: var(--text-tertiary);
      font-family: var(--font-display);
      font-size: .72rem;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--d-fast);
      -webkit-tap-highlight-color: transparent;
    }
    .dest-toolbar button:hover {
      color: var(--secondary);
      border-color: var(--secondary);
      border-style: solid;
    }

    /* ═══════ SEARCH BTN ═══════ */
    .search-btn {
      width: 100%;
      margin-top: 24px;
      padding: 16px 24px;
      background: linear-gradient(135deg, var(--primary) 0%, #7C3AED 100%);
      color: #fff;
      border: none;
      border-radius: var(--r-md);
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: all var(--d-base) var(--ease-out);
      letter-spacing: .01em;
      position: relative;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 4px 16px var(--primary-glow);
    }
    .search-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--primary-hover), var(--secondary));
      opacity: 0;
      transition: opacity var(--d-base);
    }
    .search-btn span { position: relative; z-index: 1; }
    .search-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px var(--primary-glow);
    }
    .search-btn:hover:not(:disabled)::before { opacity: 1; }
    .search-btn:active:not(:disabled) { transform: translateY(0); }
    .search-btn:disabled { opacity: .6; cursor: not-allowed; }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 10px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ═══════ HOTEL TOGGLE ═══════ */
    .toggle-row {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--r-lg);
      padding: 14px 20px;
      margin-bottom: 16px;
    }
    .toggle-row .label-text {
      font-size: .88rem;
      color: var(--text-secondary);
    }
    .toggle {
      position: relative;
      width: 44px; height: 24px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-track {
      position: absolute; inset: 0;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-default);
      border-radius: var(--r-full);
      transition: all var(--d-base);
    }
    .toggle input:checked + .toggle-track {
      background: var(--primary);
      border-color: var(--primary);
    }
    .toggle-knob {
      position: absolute;
      top: 3px; left: 3px;
      width: 16px; height: 16px;
      background: #fff;
      border-radius: 50%;
      transition: transform var(--d-base) var(--ease-spring);
      pointer-events: none;
    }
    .toggle input:checked ~ .toggle-knob { transform: translateX(20px); }

    /* ═══════ RESULTS ═══════ */
    .results-header {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 14px;
      padding: 0 4px;
    }
    .results-header h2 {
      font-family: var(--font-display);
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: -.01em;
    }
    .results-count {
      font-size: .8rem;
      color: var(--text-tertiary);
      font-variant-numeric: tabular-nums;
    }

    .flight-card {
      position: relative;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--r-lg);
      padding: 18px 20px;
      margin-bottom: 10px;
      transition: all var(--d-base) var(--ease-out);
      animation: cardEnter .4s var(--ease-out) both;
      overflow: hidden;
    }
    @keyframes cardEnter {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .flight-card:hover {
      border-color: var(--border-strong);
      background: var(--bg-card-hover);
      transform: translateY(-2px);
      box-shadow: var(--shadow-glow);
    }
    .flight-card.cheapest {
      border-color: var(--success);
      box-shadow: 0 0 0 1px var(--success), 0 0 24px rgba(16,185,129,.15);
    }

    .badge {
      position: absolute;
      top: 14px; right: 20px;
      display: inline-flex; align-items: center; gap: 4px;
      font-family: var(--font-display);
      font-size: .62rem;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: var(--r-full);
      letter-spacing: .06em;
      text-transform: uppercase;
    }
    .badge-cheapest {
      background: var(--success-muted);
      color: var(--success);
    }

    .card-top {
      display: flex; justify-content: space-between; align-items: flex-start;
      gap: 12px;
    }
    .card-dest {
      font-family: var(--font-display);
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: -.01em;
      line-height: 1.2;
    }
    .card-dest .flag { margin-right: 8px; font-size: 1.15rem; }
    .card-origin {
      font-size: .78rem;
      color: var(--text-tertiary);
      margin-top: 4px;
    }
    .card-origin .code {
      font-family: var(--font-display);
      font-weight: 600;
      color: var(--secondary);
    }
    .card-price { text-align: right; flex-shrink: 0; }
    .price-flight {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--primary-hover);
      font-variant-numeric: tabular-nums;
      letter-spacing: -.02em;
      line-height: 1;
    }
    .price-flight .kr {
      font-size: .85rem;
      color: var(--text-tertiary);
      font-weight: 500;
      margin-left: 2px;
    }
    .price-total {
      font-size: .72rem;
      color: var(--text-tertiary);
      margin-top: 6px;
      font-variant-numeric: tabular-nums;
    }
    .price-total b { color: var(--text-secondary); font-weight: 600; }

    .card-details {
      display: flex; gap: 14px; flex-wrap: wrap;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border-subtle);
    }
    .detail {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: .76rem;
      color: var(--text-tertiary);
      font-variant-numeric: tabular-nums;
    }
    .detail b { color: var(--text-secondary); font-weight: 500; }
    .stops-0 { color: var(--success) !important; }
    .stops-1 { color: var(--warning) !important; }
    .stops-2 { color: var(--error) !important; }

    /* Skeleton loaders */
    .skeleton {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--r-lg);
      padding: 18px 20px;
      margin-bottom: 10px;
      position: relative;
      overflow: hidden;
    }
    .skeleton::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.04), transparent);
      animation: shimmer 1.6s infinite;
    }
    @keyframes shimmer {
      from { transform: translateX(-100%); }
      to { transform: translateX(100%); }
    }
    .sk-line {
      height: 14px;
      background: var(--bg-tertiary);
      border-radius: 4px;
      margin-bottom: 10px;
    }
    .sk-line.lg { height: 22px; width: 60%; }
    .sk-line.sm { height: 10px; width: 40%; }

    .loading-state {
      text-align: center;
      padding: 30px 20px 10px;
    }
    .loading-state .label-loading {
      font-family: var(--font-display);
      font-size: .85rem;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }
    .loading-state .progress {
      font-size: .75rem;
      color: var(--text-tertiary);
      font-variant-numeric: tabular-nums;
    }

    .empty-state, .error-state {
      text-align: center;
      padding: 60px 24px;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--r-lg);
    }
    .empty-state .icon {
      font-size: 2.8rem;
      margin-bottom: 14px;
      opacity: .6;
    }
    .empty-state h3 {
      font-family: var(--font-display);
      font-size: 1.05rem;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .empty-state p {
      color: var(--text-tertiary);
      font-size: .85rem;
    }
    .error-state {
      border-color: var(--error-muted);
      background: linear-gradient(180deg, var(--error-muted), var(--bg-card));
    }
    .error-state h3 {
      font-family: var(--font-display);
      color: var(--error);
      margin-bottom: 8px;
      font-size: 1rem;
    }
    .error-state p {
      color: var(--text-secondary);
      font-size: .82rem;
      margin-bottom: 4px;
    }

    .api-note {
      font-size: .72rem;
      color: var(--text-tertiary);
      text-align: center;
      margin-top: 16px;
      opacity: .7;
    }

    .hidden { display: none !important; }

    /* ═══════ RESPONSIVE ═══════ */
    @media (max-width: 640px) {
      .container { padding: 20px 14px 80px; }
      .header { padding: 8px 0 24px; }
      .search-panel { padding: 20px 18px; border-radius: var(--r-lg); }
      .date-row { flex-direction: column; }
      input[type="date"] { max-width: none; width: 100%; }
      .flex-dates { grid-template-columns: 1fr; }
      .card-top { flex-direction: column; }
      .card-price { text-align: left; width: 100%; }
      .price-flight { font-size: 1.65rem; }
      .badge { position: static; align-self: flex-start; margin-bottom: 8px; }
      .dur-tab { padding: 9px 12px; font-size: .76rem; min-width: 56px; }
      .chip { padding: 10px 14px; font-size: .82rem; }
      .search-btn { padding: 18px 24px; font-size: 1rem; }
    }
  </style>
</head>
<body>

<div class="container">

  <div class="header">
    <div class="logo">flyyg</div>
    <p class="tagline">Hitta billigaste helgresorna från alla flygplatser nära dig</p>
    <div class="badge-row">
      <span class="mini-badge"><span class="dot"></span>LIVE PRISER</span>
      <span class="mini-badge">14 FLYGPLATSER</span>
      <span class="mini-badge">25 DESTINATIONER</span>
    </div>
  </div>

  <!-- Duration tabs -->
  <div class="dur-tabs" role="tablist">
    <button class="dur-tab active" data-days="2" onclick="selectDuration(2)">2 dagar</button>
    <button class="dur-tab" data-days="3" onclick="selectDuration(3)">3 dagar</button>
    <button class="dur-tab" data-days="5" onclick="selectDuration(5)">5 dagar</button>
    <button class="dur-tab" data-days="7" onclick="selectDuration(7)">7 dagar</button>
    <button class="dur-tab" data-days="0" onclick="selectDuration(0)">Flex</button>
  </div>

  <!-- Search panel -->
  <div class="search-panel">

    <!-- Fixed duration -->
    <div id="fixed-date-section">
      <div class="label">Avresedag</div>
      <div class="quick-dates" id="quick-dates">
        <button class="qd-btn" onclick="quickDate('today', this)">Idag</button>
        <button class="qd-btn" onclick="quickDate('tomorrow', this)">Imorgon</button>
        <button class="qd-btn" onclick="quickDate('thisWeekend', this)">Denna helg</button>
        <button class="qd-btn active" onclick="quickDate('nextWeekend', this)">
          Nästa helg
          <span class="countdown" id="next-weekend-countdown"></span>
        </button>
        <button class="qd-btn" onclick="quickDate('nextWeek', this)">Nästa vecka</button>
      </div>
      <div class="date-row">
        <input type="date" id="dep-date" onchange="updateReturnDate();clearQuickDate()">
        <div class="trip-summary">
          <span id="trip-dep-label">—</span>
          <span class="arrow">→</span>
          <span id="trip-ret-label">—</span>
          <span class="nights" id="trip-nights"></span>
          <div class="date-nav">
            <button onclick="shiftDate(-7)" title="Förra veckan" aria-label="Förra veckan">‹</button>
            <button onclick="shiftDate(7)" title="Nästa vecka" aria-label="Nästa vecka">›</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Flex dates -->
    <div id="flex-date-section" class="hidden">
      <div class="label">Datum</div>
      <div class="flex-dates">
        <div>
          <input type="date" id="flex-dep">
        </div>
        <div>
          <input type="date" id="flex-ret">
        </div>
      </div>
    </div>

    <!-- Airports -->
    <div class="section">
      <div class="label">Sök från dessa flygplatser</div>
      <div class="airport-grid" id="airport-grid"></div>
    </div>

    <!-- Destinations -->
    <div class="section">
      <div class="label">Destinationer</div>
      <div class="dest-toolbar">
        <button onclick="toggleAllDests()">Välj alla / ingen</button>
      </div>
      <div class="dest-grid" id="dest-grid"></div>
    </div>

    <button class="search-btn" id="search-btn" onclick="doSearch()">
      <span>Sök flyg →</span>
    </button>
  </div>

  <!-- Hotel toggle -->
  <div class="toggle-row hidden" id="hotel-toggle-row">
    <span class="label-text">🏨 Inkludera uppskattat hotell i totalpris</span>
    <label class="toggle">
      <input type="checkbox" id="hotel-toggle" onchange="rerenderResults()">
      <div class="toggle-track"></div>
      <div class="toggle-knob"></div>
    </label>
  </div>

  <div id="results-area"></div>

</div>

<script>
const AIRPORTS = [
  { code: 'GOT', name: 'Göteborg', default: true },
  { code: 'CPH', name: 'Köpenhamn', default: true },
  { code: 'MMX', name: 'Malmö', default: true },
  { code: 'HAD', name: 'Halmstad', default: false },
  { code: 'ARN', name: 'Arlanda', default: false },
  { code: 'NYO', name: 'Skavsta', default: false },
  { code: 'VST', name: 'Västerås', default: false },
  { code: 'NRK', name: 'Norrköping', default: false },
  { code: 'LPI', name: 'Linköping', default: false },
  { code: 'JKG', name: 'Jönköping', default: false },
  { code: 'KSD', name: 'Karlstad', default: false },
  { code: 'VXO', name: 'Växjö', default: false },
  { code: 'KLR', name: 'Kalmar', default: false },
  { code: 'RNB', name: 'Ronneby', default: false },
];

const DESTINATIONS = [
  { code: 'LON', name: 'London', flag: '🇬🇧', hotel: 1100 },
  { code: 'BCN', name: 'Barcelona', flag: '🇪🇸', hotel: 750 },
  { code: 'BER', name: 'Berlin', flag: '🇩🇪', hotel: 700 },
  { code: 'AMS', name: 'Amsterdam', flag: '🇳🇱', hotel: 950 },
  { code: 'PRG', name: 'Prag', flag: '🇨🇿', hotel: 550 },
  { code: 'BUD', name: 'Budapest', flag: '🇭🇺', hotel: 500 },
  { code: 'FCO', name: 'Rom', flag: '🇮🇹', hotel: 800 },
  { code: 'CDG', name: 'Paris', flag: '🇫🇷', hotel: 1000 },
  { code: 'ALC', name: 'Alicante', flag: '🇪🇸', hotel: 600 },
  { code: 'AGP', name: 'Malaga', flag: '🇪🇸', hotel: 650 },
  { code: 'ATH', name: 'Aten', flag: '🇬🇷', hotel: 600 },
  { code: 'WAW', name: 'Warszawa', flag: '🇵🇱', hotel: 500 },
  { code: 'KRK', name: 'Krakow', flag: '🇵🇱', hotel: 450 },
  { code: 'LIS', name: 'Lissabon', flag: '🇵🇹', hotel: 700 },
  { code: 'MIL', name: 'Milano', flag: '🇮🇹', hotel: 800 },
  { code: 'VIE', name: 'Wien', flag: '🇦🇹', hotel: 800 },
  { code: 'IST', name: 'Istanbul', flag: '🇹🇷', hotel: 500 },
  { code: 'SPU', name: 'Split', flag: '🇭🇷', hotel: 600 },
  { code: 'DUB', name: 'Dublin', flag: '🇮🇪', hotel: 950 },
  { code: 'NCE', name: 'Nice', flag: '🇫🇷', hotel: 850 },
  { code: 'BKK', name: 'Bangkok', flag: '🇹🇭', hotel: 350 },
  { code: 'TIA', name: 'Tirana', flag: '🇦🇱', hotel: 350 },
  { code: 'BEG', name: 'Belgrad', flag: '🇷🇸', hotel: 400 },
  { code: 'OTP', name: 'Bukarest', flag: '🇷🇴', hotel: 400 },
  { code: 'SOF', name: 'Sofia', flag: '🇧🇬', hotel: 350 },
];

let selectedDuration = 2;
let currentResults = [];
let isSearching = false;

// ===== INIT =====
document.addEventListener('DOMContentLoaded', () => {
  buildAirportChips();
  buildDestChips();
  setDefaultDepDate();
  updateReturnDate();
  updateNextWeekendCountdown();
});

function buildAirportChips() {
  const grid = document.getElementById('airport-grid');
  AIRPORTS.forEach(ap => {
    const chip = document.createElement('div');
    chip.className = 'chip airport-chip' + (ap.default ? ' selected' : '');
    chip.dataset.code = ap.code;
    chip.innerHTML = '<span class="code">' + ap.code + '</span><span class="name">' + ap.name + '</span>';
    chip.onclick = () => chip.classList.toggle('selected');
    grid.appendChild(chip);
  });
}

function buildDestChips() {
  const grid = document.getElementById('dest-grid');
  DESTINATIONS.forEach((d, i) => {
    const chip = document.createElement('div');
    chip.className = 'chip dest-chip' + (i < 10 ? ' selected' : '');
    chip.dataset.code = d.code;
    chip.textContent = d.flag + ' ' + d.name;
    chip.onclick = () => chip.classList.toggle('selected');
    grid.appendChild(chip);
  });
}

function toggleAllDests() {
  const chips = document.querySelectorAll('#dest-grid .dest-chip');
  const anySelected = [...chips].some(c => c.classList.contains('selected'));
  chips.forEach(c => c.classList.toggle('selected', !anySelected));
}

// ===== DURATION =====
function selectDuration(days) {
  selectedDuration = days;
  document.querySelectorAll('.dur-tab').forEach(t => {
    t.classList.toggle('active', parseInt(t.dataset.days) === days);
  });
  const isFixed = days > 0;
  document.getElementById('fixed-date-section').classList.toggle('hidden', !isFixed);
  document.getElementById('flex-date-section').classList.toggle('hidden', isFixed);
  if (isFixed) {
    updateReturnDate();
  } else {
    var dep = document.getElementById('dep-date').value;
    document.getElementById('flex-dep').value = dep;
    var retDate = new Date(dep);
    retDate.setDate(retDate.getDate() + 3);
    document.getElementById('flex-ret').value = fmt(retDate);
  }
}

// ===== DATES =====
function setDefaultDepDate() {
  var today = new Date();
  var day = today.getDay();
  var daysUntil = (5 - day + 7) % 7 || 7;
  var dep = new Date(today);
  dep.setDate(today.getDate() + daysUntil);
  document.getElementById('dep-date').value = fmt(dep);
}

function updateReturnDate() {
  if (selectedDuration === 0) return;
  var depVal = document.getElementById('dep-date').value;
  if (!depVal) return;
  var dep = new Date(depVal);
  var ret = new Date(dep);
  ret.setDate(dep.getDate() + selectedDuration);
  document.getElementById('trip-dep-label').textContent = formatDateShort(dep);
  document.getElementById('trip-ret-label').textContent = formatDateShort(ret);
  document.getElementById('trip-nights').textContent = '(' + selectedDuration + ' nätter)';
}

function shiftDate(days) {
  var input = document.getElementById('dep-date');
  var d = new Date(input.value);
  d.setDate(d.getDate() + days);
  input.value = fmt(d);
  updateReturnDate();
  clearQuickDate();
}

function quickDate(preset, btn) {
  var today = new Date();
  var day = today.getDay();
  var dep;

  switch (preset) {
    case 'today': dep = today; break;
    case 'tomorrow':
      dep = new Date(today);
      dep.setDate(today.getDate() + 1);
      break;
    case 'thisWeekend':
      if (day === 5 || day === 6) dep = today;
      else {
        dep = new Date(today);
        dep.setDate(today.getDate() + ((5 - day + 7) % 7));
      }
      break;
    case 'nextWeekend':
      dep = new Date(today);
      var daysToFri = (5 - day + 7) % 7 || 7;
      if (day < 5) daysToFri += 7;
      if (day === 5 || day === 6) daysToFri = (5 - day + 7) % 7 + 7;
      dep.setDate(today.getDate() + daysToFri);
      break;
    case 'nextWeek':
      dep = new Date(today);
      dep.setDate(today.getDate() + ((1 - day + 7) % 7 || 7));
      break;
  }

  document.getElementById('dep-date').value = fmt(dep);
  updateReturnDate();

  document.querySelectorAll('.qd-btn').forEach(function(b) { b.classList.remove('active'); });
  if (btn) btn.classList.add('active');
}

function clearQuickDate() {
  document.querySelectorAll('.qd-btn').forEach(function(b) { b.classList.remove('active'); });
}

function updateNextWeekendCountdown() {
  var today = new Date();
  var day = today.getDay();
  var daysToFri = (5 - day + 7) % 7 || 7;
  if (day < 5) daysToFri += 7;
  if (day === 5 || day === 6) daysToFri = (5 - day + 7) % 7 + 7;
  var el = document.getElementById('next-weekend-countdown');
  if (el) el.textContent = 'om ' + daysToFri + ' dagar';
}

function fmt(d) { return d.toISOString().split('T')[0]; }

function formatDateShort(d) {
  var days = ['Sön','Mån','Tis','Ons','Tor','Fre','Lör'];
  var months = ['jan','feb','mar','apr','maj','jun','jul','aug','sep','okt','nov','dec'];
  return days[d.getDay()] + ' ' + d.getDate() + ' ' + months[d.getMonth()];
}

function getDates() {
  if (selectedDuration === 0) {
    return {
      dep: document.getElementById('flex-dep').value,
      ret: document.getElementById('flex-ret').value
    };
  }
  var dep = document.getElementById('dep-date').value;
  var depDate = new Date(dep);
  var retDate = new Date(depDate);
  retDate.setDate(depDate.getDate() + selectedDuration);
  return { dep: dep, ret: fmt(retDate) };
}

// ===== SEARCH =====
async function doSearch() {
  if (isSearching) return;

  var dates = getDates();
  if (!dates.dep || !dates.ret) return alert('Välj datum');

  var origins = [...document.querySelectorAll('#airport-grid .airport-chip.selected')]
    .map(c => c.dataset.code);
  if (origins.length === 0) return alert('Välj minst en flygplats');

  var dests = [...document.querySelectorAll('#dest-grid .dest-chip.selected')]
    .map(c => c.dataset.code);
  if (dests.length === 0) return alert('Välj minst en destination');

  isSearching = true;
  var btn = document.getElementById('search-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span><span>Söker flyg...</span>';

  var area = document.getElementById('results-area');
  var totalSearches = origins.length * dests.length;

  // Skeleton loaders
  var skeletonHtml =
    '<div class="loading-state">' +
    '<div class="label-loading">Söker billigaste flygningarna</div>' +
    '<div class="progress" id="loading-progress">0/' + totalSearches + ' kombinationer</div>' +
    '</div>';
  for (var s = 0; s < 4; s++) {
    skeletonHtml +=
      '<div class="skeleton">' +
      '<div class="sk-line lg"></div>' +
      '<div class="sk-line sm"></div>' +
      '<div class="sk-line"></div>' +
      '</div>';
  }
  area.innerHTML = skeletonHtml;

  try {
    var allResults = [];
    var completed = 0;

    for (var oi = 0; oi < origins.length; oi++) {
      var origin = origins[oi];
      var qs = 'origins=' + origin +
        '&destinations=' + dests.join(',') +
        '&outbound_date=' + dates.dep +
        '&return_date=' + dates.ret;

      var resp = await fetch('/api/flights?' + qs);
      var data = await resp.json();

      if (data.error) {
        console.warn('Error for ' + origin + ':', data.error);
        continue;
      }
      if (data.results) {
        allResults = allResults.concat(data.results);
      }
      completed += dests.length;
      var loadP = document.getElementById('loading-progress');
      if (loadP) loadP.textContent = completed + '/' + totalSearches + ' kombinationer';
    }

    currentResults = allResults;
    document.getElementById('hotel-toggle-row').classList.remove('hidden');
    rerenderResults();

  } catch (err) {
    area.innerHTML =
      '<div class="error-state">' +
      '<h3>⚠️ Sökningen misslyckades</h3>' +
      '<p>' + err.message + '</p>' +
      '<p style="opacity:.6;font-size:.75rem;margin-top:8px">Kontrollera att SERPAPI_KEY är konfigurerad i Vercel</p>' +
      '</div>';
  } finally {
    isSearching = false;
    btn.disabled = false;
    btn.innerHTML = '<span>Sök flyg →</span>';
  }
}

// ===== RENDER =====
function rerenderResults() {
  var area = document.getElementById('results-area');
  var includeHotel = document.getElementById('hotel-toggle').checked;
  var results = currentResults;

  if (results.length === 0) {
    area.innerHTML =
      '<div class="empty-state">' +
      '<div class="icon">✈️</div>' +
      '<h3>Inga flyg hittades</h3>' +
      '<p>Prova andra datum eller fler destinationer</p>' +
      '</div>';
    return;
  }

  var dates = getDates();
  var depDate = new Date(dates.dep);
  var retDate = new Date(dates.ret);
  var nights = Math.max(1, Math.round((retDate - depDate) / (1000 * 60 * 60 * 24)));

  var enriched = results.map(function(r) {
    var destInfo = DESTINATIONS.find(function(d) {
      return d.code === r.destination_code ||
        (r.destination_name && r.destination_name.toLowerCase().indexOf(d.name.toLowerCase()) >= 0);
    });
    var hotelPerNight = destInfo ? destInfo.hotel : 600;
    var hotelTotal = hotelPerNight * nights;
    var flag = destInfo ? destInfo.flag : '🌍';
    var totalCost = includeHotel ? r.price + hotelTotal : r.price;
    return Object.assign({}, r, {
      hotelPerNight: hotelPerNight,
      hotelTotal: hotelTotal,
      flag: flag,
      totalCost: totalCost,
      nights: nights
    });
  });

  enriched.sort(function(a, b) { return a.totalCost - b.totalCost; });

  var html =
    '<div class="results-header">' +
    '<h2>Resultat</h2>' +
    '<span class="results-count">' + enriched.length + ' flyg · ' + nights + ' nätter</span>' +
    '</div>';

  enriched.forEach(function(r, i) {
    var isCheapest = i === 0;
    var stopsText = r.stops === 0 ? 'Direkt' : r.stops + ' mellanlandning' + (r.stops > 1 ? 'ar' : '');
    var stopsClass = 'stops-' + Math.min(r.stops, 2);
    var durationH = Math.floor(r.total_duration / 60);
    var durationM = r.total_duration % 60;
    var destMatch = DESTINATIONS.find(function(d) { return d.code === r.destination_code; });
    var destLabel = destMatch ? destMatch.name : (r.destination_name || r.destination_code);

    html +=
      '<div class="flight-card ' + (isCheapest ? 'cheapest' : '') + '" style="animation-delay:' + (i * 0.04) + 's">' +
      (isCheapest ? '<span class="badge badge-cheapest">★ Billigast</span>' : '') +
      '<div class="card-top"><div>' +
      '<div class="card-dest"><span class="flag">' + r.flag + '</span>' + destLabel + '</div>' +
      '<div class="card-origin">Från <span class="code">' + r.origin + '</span> · ' +
      (r.airlines ? r.airlines.join(', ') : '—') + '</div>' +
      '</div><div class="card-price">' +
      '<div class="price-flight">' + formatPrice(r.price) + '<span class="kr"> kr</span></div>' +
      (includeHotel ?
        '<div class="price-total">+ hotell ' + formatPrice(r.hotelTotal) + ' kr = <b>' +
        formatPrice(r.totalCost) + ' kr</b></div>' : '') +
      '</div></div>' +
      '<div class="card-details">' +
      '<div class="detail"><b class="' + stopsClass + '">' + stopsText + '</b></div>' +
      (r.total_duration ? '<div class="detail">⏱ ' + durationH + 'h ' + durationM + 'm</div>' : '') +
      (r.departure_time ? '<div class="detail">Avg ' + (r.departure_time.split(' ').pop() || r.departure_time) + '</div>' : '') +
      (includeHotel ? '<div class="detail">🏨 ~' + formatPrice(r.hotelPerNight) + ' kr/natt × ' + r.nights + '</div>' : '') +
      '</div></div>';
  });

  html += '<p class="api-note">Priser från Google Flights via SerpAPI · Hotellpriser är uppskattningar för budgethotell</p>';
  area.innerHTML = html;
}

function formatPrice(n) {
  return Math.round(n).toLocaleString('sv-SE');
}
</script>

</body>
</html>
